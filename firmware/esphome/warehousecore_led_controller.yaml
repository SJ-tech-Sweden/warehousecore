# WarehouseCore ESPHome LED Controller
#
# ESPHome-based LED controller firmware for WarehouseCore warehouse highlighting.
# Fully compatible with the existing Arduino firmware MQTT protocol, but also
# exposes native Home Assistant entities for dual control.
#
# Usage:
#   1. Copy secrets.yaml.template to secrets.yaml and fill in credentials
#   2. Adjust substitutions below (led_count, led_pin, chipset)
#   3. Install: esphome run warehousecore_led_controller.yaml
#
# Supports: ESP32, ESP32-S2, ESP32-S3, ESP32-C3, ESP32-C6

substitutions:
  # Controller identity — auto-generated from MAC suffix at runtime.
  # The prefix is combined with the last 6 hex chars of the MAC address
  # to form the controller_id (e.g., "esp-a1b2c3").
  controller_id_prefix: "esp"

  # MQTT topic prefix — must match LED_MQTT_TOPIC_PREFIX in WarehouseCore .env
  topic_prefix: "weidelbach"

  # Warehouse ID — must match LED_WAREHOUSE_ID in WarehouseCore .env
  warehouse_id: "WDL"

  # LED strip configuration
  led_count: "600"
  led_pin: "GPIO5"
  chipset: "SK6812_GRBW"

  # Heartbeat interval in seconds
  heartbeat_interval: "15"

  # Firmware version
  firmware_version: "1.0.0"

esphome:
  name: warehousecore-led
  friendly_name: "WarehouseCore LED Controller"
  on_boot:
    priority: -100
    then:
      - lambda: |-
          // Build controller_id from MAC suffix
          std::string mac = get_mac_address();
          // Remove colons
          std::string clean;
          for (char c : mac) {
            if (c != ':') clean += tolower(c);
          }
          // Take last 6 hex characters
          if (clean.length() >= 6) {
            id(controller_id) = "${controller_id_prefix}-" + clean.substr(clean.length() - 6);
          } else {
            id(controller_id) = "${controller_id_prefix}-" + clean;
          }
          id(topic_suffix) = id(controller_id);
          ESP_LOGI("boot", "Controller ID: %s", id(controller_id).c_str());

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:
  level: INFO

# Enable OTA updates (for Home Assistant / ESPHome dashboard)
ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "WC-LED-Fallback"
    password: !secret ap_password

captive_portal:

# Global variables
globals:
  - id: controller_id
    type: std::string
    restore_value: false
    initial_value: '"esp-000000"'
  - id: topic_suffix
    type: std::string
    restore_value: false
    initial_value: '"esp-000000"'
  - id: active_led_count
    type: int
    restore_value: false
    initial_value: "0"
  - id: leds_are_active
    type: bool
    restore_value: false
    initial_value: "false"

# MQTT configuration — communicates with WarehouseCore using the same
# topic structure as the Arduino firmware
mqtt:
  broker: !secret mqtt_host
  port: !secret mqtt_port
  username: !secret mqtt_user
  password: !secret mqtt_password
  discovery: true
  birth_message:
  will_message:
  on_connect:
    - lambda: |-
        ESP_LOGI("mqtt", "Connected - subscribing to command topic");
    - mqtt.subscribe:
        topic: !lambda |-
          return "${topic_prefix}/" + id(topic_suffix) + "/cmd";
        then:
          - lambda: |-
              // Parse incoming WarehouseCore JSON command
              std::string payload_str(x.c_str());
              ESP_LOGI("mqtt", "Command received: %s", payload_str.c_str());

              // Parse JSON
              DynamicJsonDocument doc(4096);
              DeserializationError error = deserializeJson(doc, payload_str);
              if (error) {
                ESP_LOGW("mqtt", "JSON parse error: %s", error.c_str());
                return;
              }

              const char* op = doc["op"];
              if (!op) {
                ESP_LOGW("mqtt", "Missing 'op' field");
                return;
              }

              if (strcmp(op, "highlight") == 0) {
                // Clear existing state
                auto call = id(led_strip).turn_on();
                call.set_effect("warehousecore");
                call.perform();

                // Store the command JSON for the custom effect to use
                id(pending_command) = payload_str;
                id(command_updated) = true;
                id(leds_are_active) = true;

                // Count active LEDs
                int pixel_count = 0;
                JsonArray shelves = doc["shelves"];
                for (JsonObject shelf : shelves) {
                  JsonArray bins = shelf["bins"];
                  for (JsonObject bin : bins) {
                    JsonArray pixels = bin["pixels"];
                    pixel_count += pixels.size();
                  }
                }
                id(active_led_count) = pixel_count;
                ESP_LOGI("cmd", "Highlight: %d pixels active", pixel_count);

              } else if (strcmp(op, "clear") == 0) {
                auto call = id(led_strip).turn_off();
                call.perform();
                id(active_led_count) = 0;
                id(leds_are_active) = false;
                ESP_LOGI("cmd", "Clear: all LEDs off");

              } else if (strcmp(op, "identify") == 0) {
                // Flash all LEDs white 3 times
                auto call = id(led_strip).turn_on();
                call.set_effect("identify");
                call.perform();
                ESP_LOGI("cmd", "Identify: flashing all LEDs");

              } else if (strcmp(op, "config") == 0) {
                // Config commands are handled differently in ESPHome
                // LED count and pin are set at compile time
                ESP_LOGI("cmd", "Config command received (compile-time in ESPHome)");

              } else if (strcmp(op, "restart") == 0) {
                ESP_LOGI("cmd", "Restart command received");
                delay(2000);
                App.safe_reboot();

              } else {
                ESP_LOGW("cmd", "Unknown operation: %s", op);
              }
    - lambda: |-
        // Send initial heartbeat after subscribing
        id(send_heartbeat).execute();

# Additional globals for command passing
globals:
  - id: pending_command
    type: std::string
    restore_value: false
    initial_value: '""'
  - id: command_updated
    type: bool
    restore_value: false
    initial_value: "false"

# LED strip — uses ESPHome's neopixelbus platform
light:
  - platform: neopixelbus
    id: led_strip
    name: "Warehouse LEDs"
    type: ${chipset}
    variant: SK6812
    pin: ${led_pin}
    num_leds: ${led_count}
    default_transition_length: 0s
    effects:
      - addressable_lambda:
          name: "warehousecore"
          update_interval: 16ms
          lambda: |-
            // This effect reads the pending_command global and applies pixel colors
            static std::string current_command;
            static std::vector<std::tuple<int, Color, std::string, uint8_t>> pixel_config;
            static unsigned long effect_start = 0;

            if (id(command_updated)) {
              id(command_updated) = false;
              current_command = id(pending_command);
              pixel_config.clear();
              effect_start = millis();

              // Parse the command
              DynamicJsonDocument doc(4096);
              if (deserializeJson(doc, current_command) != DeserializationError::Ok) return;

              JsonArray shelves = doc["shelves"];
              for (JsonObject shelf : shelves) {
                JsonArray bins = shelf["bins"];
                for (JsonObject bin : bins) {
                  JsonArray pixels = bin["pixels"];
                  const char* color_hex = bin["color"] | "#FF2A2A";
                  const char* pattern = bin["pattern"] | "breathe";
                  uint8_t intensity = bin["intensity"] | 180;

                  // Parse hex color
                  long color_val = strtol(color_hex + 1, nullptr, 16);
                  uint8_t r = (color_val >> 16) & 0xFF;
                  uint8_t g = (color_val >> 8) & 0xFF;
                  uint8_t b = color_val & 0xFF;

                  Color c(r, g, b);

                  for (JsonVariant px : pixels) {
                    int idx = px.as<int>();
                    if (idx >= 0 && idx < it.size()) {
                      pixel_config.push_back(std::make_tuple(idx, c, std::string(pattern), intensity));
                    }
                  }
                }
              }

              // Clear all pixels first
              it.all() = Color::BLACK;
            }

            unsigned long now = millis();
            for (auto& [idx, color, pattern, intensity] : pixel_config) {
              uint8_t r = color.r;
              uint8_t g = color.g;
              uint8_t b = color.b;

              if (pattern == "solid") {
                r = (r * intensity) / 255;
                g = (g * intensity) / 255;
                b = (b * intensity) / 255;
                it[idx] = Color(r, g, b);

              } else if (pattern == "blink") {
                if ((now / 500) % 2 == 0) {
                  r = (r * intensity) / 255;
                  g = (g * intensity) / 255;
                  b = (b * intensity) / 255;
                  it[idx] = Color(r, g, b);
                } else {
                  it[idx] = Color::BLACK;
                }

              } else if (pattern == "breathe") {
                float phase = (now / 2000.0f) * 2.0f * 3.14159265f;
                float breath = (sin(phase) + 1.0f) / 2.0f;
                uint8_t bi = (uint8_t)(breath * intensity);
                r = (r * bi) / 255;
                g = (g * bi) / 255;
                b = (b * bi) / 255;
                it[idx] = Color(r, g, b);
              }
            }

      - addressable_lambda:
          name: "identify"
          update_interval: 300ms
          lambda: |-
            static int blink_count = 0;
            static bool is_on = false;

            if (initial_run) {
              blink_count = 0;
              is_on = false;
            }

            if (blink_count >= 6) {
              // Done — turn off effect after 3 blink cycles
              auto call = id(led_strip).turn_off();
              call.perform();
              blink_count = 0;
              return;
            }

            if (is_on) {
              it.all() = Color::BLACK;
            } else {
              it.all() = Color(255, 255, 255);
            }
            is_on = !is_on;
            blink_count++;

# Periodic heartbeat — sends telemetry to WarehouseCore
interval:
  - interval: ${heartbeat_interval}s
    then:
      - lambda: |-
          id(send_heartbeat).execute();

# Script to send heartbeat (reusable)
script:
  - id: send_heartbeat
    then:
      - lambda: |-
          if (!mqtt::global_mqtt_client->is_connected()) return;

          DynamicJsonDocument doc(512);
          doc["status"] = "online";
          doc["controller_id"] = id(controller_id);
          doc["topic_suffix"] = id(topic_suffix);
          doc["warehouse_id"] = "${warehouse_id}";
          doc["active_leds"] = id(active_led_count);
          doc["wifi_rssi"] = WiFi.RSSI();
          doc["uptime_seconds"] = (unsigned long)(millis() / 1000);
          doc["ip_address"] = WiFi.localIP().toString().c_str();

          const char* hostname = App.get_name().c_str();
          if (hostname) {
            doc["hostname"] = hostname;
          }

          doc["firmware_version"] = "${firmware_version}";
          doc["firmware_type"] = "esphome";

          // Get MAC address
          std::string mac = get_mac_address();
          std::string clean_mac;
          for (char c : mac) {
            if (c != ':') clean_mac += tolower(c);
          }
          doc["mac_address"] = clean_mac;

          doc["led_count"] = ${led_count};
          doc["chipset"] = "${chipset}";

          std::string payload;
          serializeJson(doc, payload);

          std::string status_topic = "${topic_prefix}/" + id(topic_suffix) + "/status";
          mqtt::global_mqtt_client->publish(status_topic.c_str(), payload.c_str());
          ESP_LOGD("heartbeat", "Sent to %s", status_topic.c_str());

# Sensors exposed to Home Assistant
sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 30s

  - platform: uptime
    name: "Uptime"
    update_interval: 60s

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    mac_address:
      name: "MAC Address"

button:
  - platform: restart
    name: "Restart"
